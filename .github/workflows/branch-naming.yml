name: Enforce Branch Naming Convention

on:
  push:
    branches:
      - '*' # Trigger on any branch push
  pull_request:
    branches:
      - '*' # Trigger on any PR creation

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          if [[ "${GITHUB_REF#refs/heads/}" =~ ^(feature|content)\/[a-zA-Z0-9._-]+$ ]]; then
            echo "Branch name is valid."
          else
            echo "❌ Branch name '${GITHUB_REF#refs/heads/}' is invalid. Use the format 'feature/{feature-name}' or 'content/{content-name}'."
            exit 1
          fi
