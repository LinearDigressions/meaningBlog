name: Create PR from develop to master

on:
  push:
    branches:
      - develop  # Trigger this action when changes are pushed to develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master   # Target branch
          head: develop  # Source branch
          title: "Auto-PR: Merge develop into master"
          body: |
            This pull request was automatically created because changes were merged into the `develop` branch.
          branch: auto-sync-develop-to-master # Temporary branch for the PR
